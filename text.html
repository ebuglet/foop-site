<html>

<head>

<title>&lt;foop&gt;</title>

<style type="text/css">
/* Center the container in the middle of the browser */
body {
  font-family: verdana, arial, helvetica;
  font-size: 12pt;
  a:link, a:visited, a:hover, a:active {
      text-decoration: none;
      color: black;
  }

  margin: 0;
  display: flex;
  justify-content: center; /* Horizontal centering */
  align-items: center;     /* Vertical centering */
  min-height: 100vh;       /* Full viewport height */
  background-color: white;
}

.image-container {
  position: relative;
  width: 100px;  /* Adjust based on your image size */
  height: 34px;
}

.image-container img {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: auto;
  transition: opacity 0.5s ease; /* Smooth fade effect */
}

/* Hide the top image by default */
.img-front {
  opacity: 0;
}

/* Show the top image when hovering over the container */
.image-container:hover .img-front {
  opacity: 1;
}

.bottom-right-container {
    /* Positions the element relative to the browser window (viewport) */
    position: fixed;

    right: 0;        /* Aligns the right edge to the right edge of the window */
    bottom: 0;       /* Aligns the bottom edge to the bottom edge of the window */
    background-color: white;
    padding: 5px;
    border: 0px solid black;
    z-index: 1000;             /* Ensures the div is on top of other content */
}

</style>

</head>

<body>

    <div class="image-container">
    <img src="foop_eyes_surprise.gif" alt="<foop>" class="img-back">
    <img src="foop_eyes_surprise_hover.gif" alt="<spooky foop>" class="img-front">
    </div>

    <a href="/"><div class="bottom-right-container">
        &lt;back&gt;
    </div></a>

</body>

</html>
